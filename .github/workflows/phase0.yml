name: Phase 0 validation

# Trigger manually from the Actions tab. Requires the QUIVER_API_KEY
# repository secret to be set (Settings -> Secrets and variables ->
# Actions -> New repository secret).
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backtest start (YYYY-MM-DD)'
        required: false
        default: '2018-01-01'
      top_n:
        description: 'Top-N candidates to keep'
        required: false
        default: '50'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      # Allow the workflow to push the markdown report back to the branch.
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          # Use the workflow token with write permission so the commit
          # step below can push back to the branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[prices,dev]"

      - name: Run Phase 0 validation
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          # Soft tolerance for yfinance rate-limit failures — backtest
          # engine treats missing prices gracefully.
          PYTHONUNBUFFERED: '1'
        run: |
          mkdir -p docs data/cache
          csig phase0 \
            --start "${{ github.event.inputs.start_date }}" \
            --top-n ${{ github.event.inputs.top_n }} \
            --output-dir docs
        continue-on-error: false

      - name: Upload validation report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-validation-report
          path: |
            docs/phase0_validation.md
            data/cache/ticker_facts_cache.json

      - name: Commit report back to branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/phase0_validation.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Phase 0 validation $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Print verdict summary to job log
        if: always()
        run: |
          if [ -f docs/phase0_validation.md ]; then
            echo "## Phase 0 validation report (head)"
            head -50 docs/phase0_validation.md
            echo ""
            echo "## Verdict line"
            grep -A1 "## Verdict" docs/phase0_validation.md || true
          else
            echo "No report file generated."
          fi
