name: Phase 0 diagnostic

# Manual trigger. Same QUIVER_API_KEY secret as the phase0 workflow.
# Runs the per-actor / per-sector / per-direction breakdown that tells
# us *why* the asymmetric filter underperformed baseline.
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backtest start (YYYY-MM-DD)'
        required: false
        default: '2018-01-01'
      top_n:
        description: 'Top-N candidates from the filter'
        required: false
        default: '50'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[prices,dev]"

      - name: Run Phase 0 diagnostic
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          PYTHONUNBUFFERED: '1'
        run: |
          mkdir -p docs data/cache
          icarus diagnose \
            --start "${{ github.event.inputs.start_date }}" \
            --top-n ${{ github.event.inputs.top_n }} \
            --output-dir docs

      - name: Upload diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-diagnostic-report
          path: docs/phase0_diagnostic.md

      - name: Commit report back to branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/phase0_diagnostic.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Phase 0 diagnostic $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Print headline + breakdowns to job log
        if: always()
        run: |
          if [ -f docs/phase0_diagnostic.md ]; then
            head -100 docs/phase0_diagnostic.md
          else
            echo "No report file."
          fi
