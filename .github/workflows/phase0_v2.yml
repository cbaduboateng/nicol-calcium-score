name: Phase 0 v2 (actor-skill)

# The diagnostic showed individual member skill is the dominant signal.
# This workflow runs the actor-skill-weighted version of Phase 0.
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backtest start (YYYY-MM-DD)'
        required: false
        default: '2018-01-01'
      top_n:
        description: 'Top-N candidates to keep'
        required: false
        default: '200'
      min_prior_trades:
        description: 'Min prior trades required to score an actor'
        required: false
        default: '10'
      primary_horizon_days:
        description: 'Horizon for PROCEED/KILL decision gate (skill ranking always at 90d)'
        required: false
        default: '365'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[prices,dev]"

      - name: Run Phase 0 v2 validation
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          PYTHONUNBUFFERED: '1'
        run: |
          mkdir -p docs data/cache
          csig phase0-v2 \
            --start "${{ github.event.inputs.start_date }}" \
            --top-n ${{ github.event.inputs.top_n }} \
            --min-prior-trades ${{ github.event.inputs.min_prior_trades }} \
            --primary-horizon-days ${{ github.event.inputs.primary_horizon_days }} \
            --output-dir docs

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-v2-validation-report
          path: docs/phase0_v2_validation.md

      - name: Commit report back to branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/phase0_v2_validation.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Phase 0 v2 validation $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Print verdict summary
        if: always()
        run: |
          if [ -f docs/phase0_v2_validation.md ]; then
            cat docs/phase0_v2_validation.md
          else
            echo "No report file generated."
          fi
